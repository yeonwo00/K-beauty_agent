services:
  - type: web
    name: k-beauty-agent
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn k_beauty_agent.web:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: ADMIN_TOKEN
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: DATABASE_URL
        value: sqlite:///data/k_beauty_agent.sqlite3
